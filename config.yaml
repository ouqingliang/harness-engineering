# Poll interval while the interactive run loop is alive.
sleep_seconds: 5.0

# Use the doc root as the runtime root unless the CLI overrides this.
memory_root: runtime-memory

# The harness supervisor is expected to open a human gate only for these classes.
decision_gate_tags:
  - architecture_change
  - destructive_action
  - security_boundary
  - external_side_effect
  - goal_conflict

# Run maintenance cleanup on a longer cadence when the runtime stays alive.
cleanup_maintenance_interval_seconds: 14400

# Preferred launcher for specialist agents.
default_launcher: codex_app_server

communication_host: 127.0.0.1
communication_port: 8765
